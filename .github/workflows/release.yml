name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.0). Required for manual runs.'
        required: true
        type: string
      platform:
        description: 'Platform to build (all / windows / macos)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - macos

permissions:
  contents: write
  actions: write

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      release_tag: ${{ steps.tag.outputs.tag }}
      release_name: ${{ steps.tag.outputs.name }}
      is_prerelease: ${{ steps.tag.outputs.prerelease }}
    steps:
      - id: set
        shell: bash
        run: |
          PLATFORM="${{ inputs.platform || 'all' }}"
          if [ "$PLATFORM" = "windows" ]; then
            echo 'matrix={"include":[{"os":"windows-latest","target":"x86_64-pc-windows-msvc","label":"Windows-x64"}]}' >> $GITHUB_OUTPUT
          elif [ "$PLATFORM" = "macos" ]; then
            echo 'matrix={"include":[{"os":"macos-14","target":"aarch64-apple-darwin","label":"macOS-arm64"},{"os":"macos-15","target":"x86_64-apple-darwin","label":"macOS-x64"}]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"include":[{"os":"macos-14","target":"aarch64-apple-darwin","label":"macOS-arm64"},{"os":"macos-15","target":"x86_64-apple-darwin","label":"macOS-x64"},{"os":"windows-latest","target":"x86_64-pc-windows-msvc","label":"Windows-x64"}]}' >> $GITHUB_OUTPUT
          fi

      - id: tag
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "name=JellyfishBot $TAG" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            VER="${{ inputs.version }}"
            TAG="v${VER}-build${{ github.run_number }}"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "name=JellyfishBot $TAG (manual build)" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-${{ matrix.target }}-${{ hashFiles('tauri-launcher/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.target }}-

      - name: Set version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build release
        shell: bash
        run: |
          cd tauri-launcher
          python scripts/build.py --target ${{ matrix.target }} --version "$RELEASE_VERSION"

      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist
          cp tauri-launcher/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg dist/ 2>/dev/null || true
          cp tauri-launcher/src-tauri/target/release/bundle/dmg/*.dmg dist/ 2>/dev/null || true
          ls -la dist/

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp tauri-launcher/src-tauri/target/release/bundle/nsis/*.exe dist/ 2>/dev/null || true
          cp tauri-launcher/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe dist/ 2>/dev/null || true
          ls -la dist/

      # 直接上传到 GitHub Release，跳过 artifact 中转（artifact 配额已满）
      # softprops/action-gh-release 支持多 matrix job 并发追加到同一个 tag
      - name: Publish to GitHub Release (macOS)
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          draft: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/v') }}
          fail_on_unmatched_files: true
          files: |
            dist/*.dmg

      - name: Publish to GitHub Release (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          draft: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/v') }}
          fail_on_unmatched_files: true
          files: |
            dist/*.exe

  prune-cache:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    name: Prune old caches
    steps:
      - name: Delete caches beyond the 6 most recent per target
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set +e
          for prefix in cargo-x86_64-pc-windows-msvc cargo-aarch64-apple-darwin cargo-x86_64-apple-darwin; do
            echo "=== Pruning caches with key prefix: $prefix ==="
            gh cache list --repo "$REPO" --key "$prefix" --limit 100 \
              --json id,key,createdAt --sort created_at --order desc \
              | jq -r '.[6:] | .[].id' \
              | while read -r cid; do
                  echo "  deleting cache id=$cid"
                  gh cache delete "$cid" --repo "$REPO" || true
                done
          done
          echo "=== Current cache usage ==="
          gh cache list --repo "$REPO" --limit 50 || true

      - name: Delete all workflow artifacts (artifact storage hygiene)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set +e
          echo "=== Listing artifacts ==="
          gh api "repos/$REPO/actions/artifacts?per_page=100" --paginate \
            --jq '.artifacts[] | "\(.id) \(.name) \(.size_in_bytes)"' \
            | while read -r id name size; do
                echo "  deleting artifact id=$id name=$name size=${size}B"
                gh api -X DELETE "repos/$REPO/actions/artifacts/$id" || true
              done
          echo "=== Done ==="
