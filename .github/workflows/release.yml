name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.0)'
        required: false
        type: string
      platform:
        description: 'Platform to build (all / windows / macos)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - macos

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        shell: bash
        run: |
          PLATFORM="${{ inputs.platform || 'all' }}"
          if [ "$PLATFORM" = "windows" ]; then
            echo 'matrix={"include":[{"os":"windows-latest","target":"x86_64-pc-windows-msvc","label":"Windows-x64"}]}' >> $GITHUB_OUTPUT
          elif [ "$PLATFORM" = "macos" ]; then
            echo 'matrix={"include":[{"os":"macos-14","target":"aarch64-apple-darwin","label":"macOS-arm64"},{"os":"macos-15","target":"x86_64-apple-darwin","label":"macOS-x64"}]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"include":[{"os":"macos-14","target":"aarch64-apple-darwin","label":"macOS-arm64"},{"os":"macos-15","target":"x86_64-apple-darwin","label":"macOS-x64"},{"os":"windows-latest","target":"x86_64-pc-windows-msvc","label":"Windows-x64"}]}' >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tauri-launcher/src-tauri/target
          key: rust-${{ matrix.target }}-${{ hashFiles('tauri-launcher/src-tauri/Cargo.lock') }}
          restore-keys: |
            rust-${{ matrix.target }}-

      - name: Cache runtime downloads
        uses: actions/cache@v4
        with:
          path: tauri-launcher/.cache
          key: runtime-${{ matrix.target }}-py3.12.7-node20.18.0

      - name: Set version (tag trigger)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set version (manual trigger)
        if: github.event.inputs.version != ''
        shell: bash
        run: |
          echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV

      - name: Build release
        shell: bash
        run: |
          cd tauri-launcher
          VERSION_ARG=""
          if [ -n "$RELEASE_VERSION" ]; then
            VERSION_ARG="--version $RELEASE_VERSION"
          fi
          python scripts/build.py --target ${{ matrix.target }} $VERSION_ARG

      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist
          cp tauri-launcher/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg dist/ 2>/dev/null || true
          cp tauri-launcher/src-tauri/target/release/bundle/dmg/*.dmg dist/ 2>/dev/null || true
          ls -la dist/

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp tauri-launcher/src-tauri/target/release/bundle/nsis/*.exe dist/ 2>/dev/null || true
          cp tauri-launcher/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe dist/ 2>/dev/null || true
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyfishbot-${{ matrix.label }}
          path: dist/*
          retention-days: 3

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    name: Create Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List artifacts
        run: find artifacts -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: JellyfishBot ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.msi
