<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{SERVICE_NAME}}</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/highlight.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #141419;
      --surface-hover: #1c1c24;
      --border: #2a2a35;
      --text: #e8e8ed;
      --text-secondary: #8a8a9a;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --user-bubble: #1e1e2e;
      --bot-bubble: transparent;
      --scrollbar: #2a2a35;
      --danger: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    header .logo {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; color: white;
      margin-right: 12px;
    }

    header h1 { font-size: 16px; font-weight: 600; }
    header .desc { font-size: 12px; color: var(--text-secondary); margin-left: 12px; }

    /* Auth overlay */
    #auth-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
    }
    #auth-overlay.hidden { display: none; }

    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 380px;
      max-width: 90vw;
    }
    .auth-box h2 { font-size: 18px; margin-bottom: 8px; }
    .auth-box p { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
    .auth-box input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .auth-box input:focus { border-color: var(--accent); }
    .auth-box button {
      width: 100%;
      margin-top: 16px;
      padding: 10px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .auth-box button:hover { background: var(--accent-hover); }
    .auth-error { color: var(--danger); font-size: 12px; margin-top: 8px; display: none; }

    /* Messages area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    * { scrollbar-width: thin; scrollbar-color: #44445a transparent; }
    #messages::-webkit-scrollbar { width: 7px; height: 7px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #44445a; border-radius: 4px; }
    #messages::-webkit-scrollbar-thumb:hover { background: #55557a; }

    .msg {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      word-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user-bubble);
      border: 1px solid var(--border);
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--bot-bubble);
    }
    .msg.bot pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .msg.bot code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
    }
    .msg.bot p { margin: 4px 0; }

    .msg-thinking {
      font-size: 12px;
      color: var(--text-secondary);
      border-left: 2px solid var(--accent);
      padding-left: 10px;
      margin: 4px 0 8px;
      max-height: 120px;
      overflow-y: auto;
    }

    .msg-tool {
      font-size: 12px;
      color: var(--text-secondary);
      padding: 6px 10px;
      background: var(--surface);
      border-radius: 6px;
      margin: 4px 0;
    }

    .typing-indicator {
      display: inline-flex; gap: 4px; padding: 8px 12px;
    }
    .typing-indicator span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-secondary);
      animation: blink 1.4s infinite both;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }

    /* Input area */
    #input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    #input-area form {
      display: flex;
      gap: 10px;
      max-width: 900px;
      margin: 0 auto;
    }
    #input-area textarea {
      flex: 1;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 120px;
      font-family: inherit;
    }
    #input-area textarea:focus { border-color: var(--accent); }
    .svc-img-preview { display:flex; gap:6px; padding:6px 0; overflow-x:auto; }
    .svc-img-preview .img-thumb { position:relative; flex-shrink:0; }
    .svc-img-preview .img-thumb img { width:56px; height:56px; object-fit:cover; border-radius:6px; border:1px solid var(--border); }
    .svc-img-preview .img-thumb .img-rm { position:absolute; top:-5px; right:-5px; width:16px; height:16px; border-radius:50%; background:var(--danger,#ef4444); color:#fff; border:none; font-size:10px; line-height:16px; text-align:center; cursor:pointer; padding:0; }
    .btn-attach { background:none; border:1px solid var(--border); border-radius:8px; padding:8px; cursor:pointer; color:var(--text); display:flex; align-items:center; }
    #input-area button {
      padding: 0 20px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    #input-area button:hover { background: var(--accent-hover); }
    #input-area button:disabled { opacity: 0.5; cursor: default; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .empty-state p { font-size: 14px; }
  </style>
</head>
<body>
  <!-- Auth overlay -->
  <div id="auth-overlay">
    <div class="auth-box">
      <h2>{{SERVICE_NAME}}</h2>
      <p>{{SERVICE_DESC}}</p>
      <input type="text" id="api-key-input" placeholder="请输入 API Key (sk-svc-...)" autocomplete="off" />
      <div class="auth-error" id="auth-error"></div>
      <button id="auth-btn">开始对话</button>
    </div>
  </div>

  <header>
    <div class="logo">S</div>
    <h1>{{SERVICE_NAME}}</h1>
    <span class="desc">{{SERVICE_DESC}}</span>
  </header>

  <div id="messages">
    <div class="empty-state">
      <div class="icon">💬</div>
      <p>发送消息开始对话</p>
    </div>
  </div>

  <div id="input-area">
    <div class="svc-img-preview" id="svc-img-preview" style="display:none"></div>
    <form id="chat-form">
      <input type="file" id="svc-img-input" accept="image/*" multiple style="display:none" />
      <button type="button" class="btn-attach" id="btn-svc-attach" title="上传图片" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      </button>
      <textarea id="user-input" rows="1" placeholder="输入消息... (可粘贴图片)" disabled></textarea>
      <button type="submit" id="send-btn" disabled>发送</button>
    </form>
  </div>

  <script>
    const SERVICE_ID = "{{SERVICE_ID}}";
    const API_BASE = window.location.origin;

    let apiKey = localStorage.getItem(`svc_key_${SERVICE_ID}`) || "";
    let conversationId = null;
    let isStreaming = false;
    let pendingImgs = [];

    const overlay = document.getElementById("auth-overlay");
    const keyInput = document.getElementById("api-key-input");
    const authBtn = document.getElementById("auth-btn");
    const authError = document.getElementById("auth-error");
    const messagesEl = document.getElementById("messages");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const chatForm = document.getElementById("chat-form");

    if (apiKey) {
      activateChat();
    }

    authBtn.addEventListener("click", () => {
      const key = keyInput.value.trim();
      if (!key) { showAuthErr("请输入 API Key"); return; }
      apiKey = key;
      localStorage.setItem(`svc_key_${SERVICE_ID}`, key);
      activateChat();
    });

    keyInput.addEventListener("keydown", e => {
      if (e.key === "Enter") { e.preventDefault(); authBtn.click(); }
    });

    function activateChat() {
      overlay.classList.add("hidden");
      userInput.disabled = false;
      sendBtn.disabled = false;
      document.getElementById("btn-svc-attach").disabled = false;
      userInput.focus();
      createConversation();
      _initSvcImgAttach();
    }

    function _initSvcImgAttach() {
      const fileIn = document.getElementById("svc-img-input");
      const attachBtn = document.getElementById("btn-svc-attach");
      attachBtn.addEventListener("click", () => fileIn.click());
      fileIn.addEventListener("change", () => { _addSvcFiles(fileIn.files); fileIn.value = ""; });
      userInput.addEventListener("paste", (e) => {
        const items = e.clipboardData?.items;
        if (!items) return;
        const imgs = [];
        for (const it of items) { if (it.type.startsWith("image/")) imgs.push(it.getAsFile()); }
        if (imgs.length) { e.preventDefault(); _addSvcFiles(imgs); }
      });
    }

    function _addSvcFiles(files) {
      for (const f of files) {
        if (!f.type.startsWith("image/") || pendingImgs.length >= 5) continue;
        const r = new FileReader();
        r.onload = () => { pendingImgs.push({ dataUrl: r.result, name: f.name }); _renderSvcImgPreview(); };
        r.readAsDataURL(f);
      }
    }

    function _renderSvcImgPreview() {
      const c = document.getElementById("svc-img-preview");
      if (!pendingImgs.length) { c.style.display = "none"; c.innerHTML = ""; return; }
      c.style.display = "flex";
      c.innerHTML = pendingImgs.map((img, i) =>
        `<div class="img-thumb"><img src="${img.dataUrl}"/><button class="img-rm" data-i="${i}">&times;</button></div>`
      ).join("");
      c.querySelectorAll(".img-rm").forEach(b => b.addEventListener("click", () => {
        pendingImgs.splice(+b.dataset.i, 1); _renderSvcImgPreview();
      }));
    }

    function showAuthErr(msg) {
      authError.textContent = msg;
      authError.style.display = "block";
    }

    async function createConversation() {
      try {
        const res = await fetch(`${API_BASE}/api/v1/conversations`, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
          body: JSON.stringify({ title: "" }),
        });
        if (res.status === 401) {
          apiKey = "";
          localStorage.removeItem(`svc_key_${SERVICE_ID}`);
          overlay.classList.remove("hidden");
          showAuthErr("API Key 无效，请重新输入");
          return;
        }
        const data = await res.json();
        conversationId = data.id;
      } catch (e) {
        console.error("Failed to create conversation:", e);
      }
    }

    chatForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = userInput.value.trim();
      if ((!text && !pendingImgs.length) || isStreaming) return;
      if (!conversationId) { await createConversation(); }
      if (!conversationId) return;

      let msg;
      if (pendingImgs.length) {
        msg = [];
        if (text) msg.push({ type: "text", text });
        for (const img of pendingImgs) msg.push({ type: "image_url", image_url: { url: img.dataUrl } });
        pendingImgs = [];
        _renderSvcImgPreview();
      } else {
        msg = text;
      }

      appendMsg("user", text || "[图片]");
      userInput.value = "";
      autoResize();
      isStreaming = true;
      sendBtn.disabled = true;

      const botEl = appendMsg("bot", "");
      const typingEl = document.createElement("div");
      typingEl.className = "typing-indicator";
      typingEl.innerHTML = "<span></span><span></span><span></span>";
      botEl.appendChild(typingEl);

      try {
        const res = await fetch(`${API_BASE}/api/v1/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
          body: JSON.stringify({ conversation_id: conversationId, message: msg }),
        });

        if (!res.ok) {
          typingEl.remove();
          botEl.innerHTML = `<span style="color:var(--danger)">Error: ${res.status}</span>`;
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let fullText = "";
        let thinkingText = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const lines = buffer.split("\n");
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const raw = line.slice(6).trim();
            if (!raw || raw === "[DONE]") continue;
            let evt;
            try { evt = JSON.parse(raw); } catch { continue; }

            if (evt.type === "token") {
              if (typingEl.parentNode) typingEl.remove();
              fullText += evt.content;
              renderBotMsg(botEl, fullText, thinkingText);
            } else if (evt.type === "thinking") {
              thinkingText += evt.content;
              renderBotMsg(botEl, fullText, thinkingText);
            } else if (evt.type === "tool_call") {
              if (typingEl.parentNode) typingEl.remove();
              const toolEl = document.createElement("div");
              toolEl.className = "msg-tool";
              toolEl.textContent = `🔧 ${evt.name}`;
              botEl.appendChild(toolEl);
            } else if (evt.type === "tool_result") {
              const toolEl = document.createElement("div");
              toolEl.className = "msg-tool";
              toolEl.textContent = `✅ ${evt.name}: ${(evt.content || "").slice(0, 200)}`;
              botEl.appendChild(toolEl);
            } else if (evt.type === "error") {
              if (typingEl.parentNode) typingEl.remove();
              fullText += `\n\n**Error:** ${evt.content}`;
              renderBotMsg(botEl, fullText, thinkingText);
            }
          }
        }
        if (typingEl.parentNode) typingEl.remove();
        if (!fullText) botEl.innerHTML = '<span style="color:var(--text-secondary)">（无回复）</span>';

      } catch (err) {
        typingEl.remove();
        botEl.innerHTML = `<span style="color:var(--danger)">Network error: ${err.message}</span>`;
      } finally {
        isStreaming = false;
        sendBtn.disabled = false;
        userInput.focus();
      }
    });

    function appendMsg(role, text) {
      const empty = messagesEl.querySelector(".empty-state");
      if (empty) empty.remove();
      const el = document.createElement("div");
      el.className = `msg ${role}`;
      if (role === "user") el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    function renderBotMsg(el, text, thinking) {
      let html = "";
      if (thinking) {
        html += `<div class="msg-thinking">${escapeHtml(thinking)}</div>`;
      }
      if (text) {
        html += DOMPurify.sanitize(marked.parse(text));
      }
      el.innerHTML = html;
      el.querySelectorAll("pre code").forEach(b => hljs.highlightElement(b));
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    userInput.addEventListener("input", autoResize);
    userInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        chatForm.dispatchEvent(new Event("submit"));
      }
    });

    function autoResize() {
      userInput.style.height = "auto";
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + "px";
    }
  </script>
</body>
</html>
