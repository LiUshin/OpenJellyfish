# ============================================================
# Langfuse Nginx 反向代理配置
#
# 将此文件复制到服务器:
#   sudo cp nginx.conf /etc/nginx/sites-available/langfuse.easybanker.ai
#   sudo ln -s /etc/nginx/sites-available/langfuse.easybanker.ai /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL 证书 (Let's Encrypt):
#   sudo certbot --nginx -d langfuse.easybanker.ai
#
# ⚠️ 使用前请将 langfuse.easybanker.ai 替换为你的实际域名
# ============================================================

# HTTP → HTTPS 重定向
server {
    listen 80;
    listen [::]:80;
    server_name langfuse.easybanker.ai;

    # Let's Encrypt 验证路径
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主配置
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name langfuse.easybanker.ai;

    # ==================== SSL 配置 ====================
    # certbot 会自动填充这两行，首次可先注释掉用 HTTP 测试
    ssl_certificate /etc/letsencrypt/live/langfuse.easybanker.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/langfuse.easybanker.ai/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ==================== 通用配置 ====================
    client_max_body_size 50M;

    # ==================== 反向代理到 Langfuse ====================
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # 标准代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持 (Langfuse Dashboard 实时更新)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时配置 (Langfuse 某些操作较慢)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        # 缓冲配置
        proxy_buffering off;
    }
}
