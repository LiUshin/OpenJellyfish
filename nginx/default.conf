upstream app {
    server jellyfishbot:3000;
}

# WebSocket 升级映射:仅当请求带 Upgrade 头时才回 "upgrade",
# 普通 HTTP 请求回 "close"(LiveKit 同一路径上既有 WS 信令也有 HTTP/TWIRP 调用)。
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name example.ai;

    client_max_body_size 100M;

    # SSE streaming (consumer chat + admin chat)
    location ~ /api/(v1/)?chat {
        proxy_pass         http://app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # LiveKit 语音插件信令(WebSocket)反代 → livekit-server:7880
    # 用变量 + resolver 延迟 DNS 解析:未启用语音叠加层时本块不会导致 nginx 启动失败。
    # 浏览器侧 LIVEKIT_URL 设为 wss://<域名>/livekit 即走此路径。
    # 注意:proxy_pass 带变量时 nginx 不会自动透传 URI,故用 rewrite 显式剥掉
    #       /livekit 前缀(query 自动保留),否则 /livekit/rtc/v1?token=.. 会丢失。
    location /livekit/ {
        resolver 127.0.0.11 valid=10s;
        set $livekit_upstream livekit-server;
        rewrite ^/livekit/(.*)$ /$1 break;
        proxy_pass         http://$livekit_upstream:7880;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # All other requests → Express (static + API proxy)
    location / {
        proxy_pass         http://app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }
}
